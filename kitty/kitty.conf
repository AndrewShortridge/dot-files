# ~/.config/kitty/kitty.conf
# Reload with ctrl+shift+f5 (default kitty_mod is ctrl+shift)

# Phase 2: use Rust implementation
env KSESSION_IMPL $HOME/.local/bin/ksession

# ---- Cursor ----
# Color of the character drawn under the block cursor. The cursor's own
# (background) color is set by the running app (e.g. Neovim's Cursor highlight);
# kitty always controls the text color, defaulting to a near-black #111111.
cursor_text_color #ffffff

# Use the splits layout so neighboring_window works directionally.
# You can still cycle layouts with kitty_mod+l.
enabled_layouts splits,stack

# ---- Vim-style window navigation ----
# Move focus between split windows
map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right

# Swap the current window with a neighbor (Shift+hjkl)
map ctrl+shift+h move_window left
map ctrl+shift+j move_window down
map ctrl+shift+k move_window up
map ctrl+shift+l move_window right

# ---- Splits ----
# Open new window splits: | for vertical, - for horizontal (matches tmux convention)
map ctrl+shift+\ launch --location=vsplit --cwd=current
map ctrl+shift+minus launch --location=hsplit --cwd=current

# Close the current window
map ctrl+shift+w close_window

# Rotate split orientation (horizontal <-> vertical)
map ctrl+shift+r layout_action rotate

# Zoom / unzoom current window (stack layout toggle)
map ctrl+shift+z toggle_layout stack

# ---- Resizing (vim-ish: < > + -) ----
map ctrl+alt+h resize_window narrower
map ctrl+alt+l resize_window wider
map ctrl+alt+k resize_window taller
map ctrl+alt+j resize_window shorter
map ctrl+alt+0 resize_window reset

# ---- Tabs ----
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+q close_tab
map ctrl+tab     next_tab
map ctrl+shift+tab previous_tab

# ---- Quality of life ----
# Note: ctrl+l (clear screen) is rebound above for window-nav.
# Use this to clear the terminal instead:
map ctrl+shift+x clear_terminal reset active

# ---- kitty-scrollback.nvim ----
# Required for the plugin to drive kitty over its control socket.
allow_remote_control socket-only
listen_on unix:/tmp/kitty
shell_integration enabled

# nvim and miniconda tools (fzf, etc.) live outside the GUI-launch PATH
# (set in .bashrc/.zshrc only) — tell kitty where to find them when
# spawning kittens and scripts via `launch`.
exe_search_path /opt/nvim-linux-x86_64/bin
exe_search_path /home/andrew/miniconda3/bin

# Alias the kitten that ships with the nvim plugin.
action_alias kitty_scrollback_nvim kitten /home/andrew/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py

# Browse the full scrollback in nvim
map ctrl+shift+f1 kitty_scrollback_nvim
# Browse just the output of the last command in nvim
map ctrl+shift+f2 kitty_scrollback_nvim --config ksb_builtin_last_cmd_output
# Right-click a previous prompt → open that command's output in nvim
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output

# ---- Leader-style chord prefix (ctrl+space) ----
# Tap ctrl+space, release, then tap the next key. No holding required.

# Splits ( | vertical, - horizontal, c close )
map ctrl+space>bar    launch --location=vsplit --cwd=current
map ctrl+space>minus  launch --location=hsplit --cwd=current
map ctrl+space>c      close_window

# Window navigation (mirrors bare ctrl+hjkl). Bare ctrl+l still
# does neighboring_window right, so intra-session nav is unaffected.
map ctrl+space>h neighboring_window left
map ctrl+space>j neighboring_window down
map ctrl+space>k neighboring_window up

# Window swaps (shift+hjkl as the second key, mirrors bare ctrl+shift+hjkl)
map ctrl+space>shift+h move_window left
map ctrl+space>shift+j move_window down
map ctrl+space>shift+k move_window up
map ctrl+space>shift+l move_window right

# Maximize / unmaximize the current window (stack layout toggle)
map ctrl+space>m toggle_layout stack

# Interactive resize mode: tap leader+r, then use arrow keys to nudge,
# Enter to commit, Esc to cancel. (The built-in kitten only accepts
# arrows/PgUp/PgDn/Home/End — hjkl is unsupported here. For vim-key
# resizing, use the held-modifier ctrl+alt+hjkl bindings above.)
map ctrl+space>r start_resizing_window

# Tabs
map ctrl+space>t new_tab_with_cwd
map ctrl+space>x close_tab
map ctrl+space>n next_tab
map ctrl+space>p previous_tab
map ctrl+space>shift+n move_tab_forward
map ctrl+space>shift+p move_tab_backward
map ctrl+space>shift+r set_tab_title

# Scrollback in nvim (open full buffer; use / inside nvim to search)
map ctrl+space>slash kitty_scrollback_nvim

# Command palette (leader+?)
map ctrl+space>shift+slash command_palette

# Fuzzy session picker — fzf across all kitty sessions (OS windows).
map ctrl+space>s launch --type=overlay --cwd=current /home/andrew/.config/kitty/scripts/session-picker.sh

# Save the current OS window as a named session (ksession). Prompts for a
# name (with autocomplete over existing sessions to allow overwrite).
map ctrl+space>shift+s launch --type=overlay --cwd=current /home/andrew/.config/kitty/scripts/ksession-save-prompt.sh

# Fuzzy tab/window picker — fzf across every tab + split in the CURRENT session.
map ctrl+space>f launch --type=overlay --cwd=current /home/andrew/.config/kitty/scripts/tab-picker.sh

# Load a project's session file INTO the current kitty (adds its tabs to
# this OS window, closes all other old tabs, keeps the tab you launched
# the picker from). Same kitty process — see ctrl+space>s for new-process.
map ctrl+space>o launch --type=overlay --cwd=current /home/andrew/.config/kitty/scripts/project-loader.sh
